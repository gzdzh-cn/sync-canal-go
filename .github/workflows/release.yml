name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          mkdir -p release
          
          # Platform matrix
          PLATFORMS=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )
          
          for PLATFORM in "${PLATFORMS[@]}"; do
            IFS='/' read -r GOOS GOARCH <<< "$PLATFORM"
            BINARY_NAME="sync-canal-go"
            [ "$GOOS" = "windows" ] && BINARY_NAME="sync-canal-go.exe"
            
            echo "Building for $GOOS/$GOARCH..."
            GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=0 go build \
              -ldflags="-s -w -X main.Version=${{ steps.version.outputs.version }}" \
              -o "release/${GOOS}_${GOARCH}/${BINARY_NAME}" .
            
            # Package
            cd release
            if [ "$GOOS" = "windows" ]; then
              zip -r "sync-canal-go_${{ steps.version.outputs.version }}_${GOOS}_${GOARCH}.zip" "${GOOS}_${GOARCH}"
            else
              tar -czf "sync-canal-go_${{ steps.version.outputs.version }}_${GOOS}_${GOARCH}.tar.gz" "${GOOS}_${GOARCH}"
            fi
            rm -rf "${GOOS}_${GOARCH}"
            cd ..
          done

      - name: Generate checksums
        run: |
          cd release
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/*.zip
            release/checksums.txt
