name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: false
        default: 'latest'
  workflow_call:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: false
        default: 'latest'
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SERVER_PORT || 22 }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          IMAGE_TAG="${{ inputs.image_tag || 'latest' }}"
          COMPOSE_PATH="${{ secrets.COMPOSE_PATH || '/www/wwwroot/docker/sync-canal-go' }}"
          SERVER_HOST="${{ secrets.SERVER_HOST }}"
          
          echo "=== Server: $SERVER_HOST ==="
          echo "=== Compose path: $COMPOSE_PATH ==="
          echo "=== Image tag: $IMAGE_TAG ==="
          
          ssh -p ${{ secrets.SERVER_PORT || 22 }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << EOF
            set -e
            
            cd ${COMPOSE_PATH}
            
            echo "=== Current directory ==="
            pwd
            
            # 设置镜像标签环境变量
            export SYNC_CANAL_TAG=${IMAGE_TAG}
            
            echo "=== Pulling new image ==="
            docker pull registry.cn-heyuan.aliyuncs.com/gzdzh/sync-canal-go:\$SYNC_CANAL_TAG
            
            echo "=== Starting new container ==="
            docker-compose -f docker-compose-site.yml up -d --no-deps --force-recreate sync-canal-go
            
            echo "=== Waiting for container to start ==="
            sleep 5
            
            echo "=== Health check ==="
            if docker ps | grep -q sync-canal-go; then
              echo "✅ Container is running"
              docker logs --tail 30 sync-canal-go
            else
              echo "❌ Container failed to start"
              docker logs sync-canal-go
              exit 1
            fi
          EOF

      - name: Verify deployment
        run: |
          sleep 10
          curl -f https://${{ secrets.SERVER_HOST }}:8000/api/health || curl -f http://${{ secrets.SERVER_HOST }}:8000/ || echo "Health check skipped"
