
services:
  customer_pro:
    container_name: customer_pro
    image: registry.cn-heyuan.aliyuncs.com/gzdzh/customer_pro:v1.2.8
    restart: always
    ports:
      - 3136:3136
    # network_mode: host  # 相当于 --network="host"  linux线上使用
    environment:
      TZ: Asia/Shanghai # 指定时区
    volumes:
      - ./docker-data/site/data/:/app/data/
      - ./docker-data/site/config/:/app/config/
      - /www/wwwroot/:/www/wwwroot/
      - ./docker-data/site/resource/:/app/resource/
      - ./docker-data/site/public/:/app/public/
    networks:
      - dzh3136-network


  # ============================================================
  # ClickHouse 服务（OLAP 查询数据库）
  # ============================================================
  clickhouse:
    image: j0y60snygwu8b60dmu.xuanyuan.run/clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    restart: always
    ports:
      - "8123:8123"  # HTTP 接口（用于 HTTP 查询）
      - "9000:9000"  # Native 接口（用于 ClickHouse Client）
    environment:
      TZ: Asia/Shanghai  # 时区设置
      CLICKHOUSE_DB: dzh3136_go  # 数据库名
      CLICKHOUSE_USER: default  # 用户名
      CLICKHOUSE_PASSWORD: dzh123456  # 密码
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1  # 允许默认管理
      CLICKHOUSE_MAX_MEMORY_USAGE: 0.6  # 最大内存使用（60%）
      CLICKHOUSE_MAX_SERVER_MEMORY_USAGE: 0.6  # 最大服务器内存使用（60%）
      CLICKHOUSE_MAX_THREADS: 16  # 最大线程数
      CLICKHOUSE_MAX_CONCURRENT_QUERIES: 32  # 最大并发查询数
    volumes:
      - ./docker-data/clickhouse/data:/var/lib/clickhouse
      - ./docker-data/clickhouse/logs:/var/log/clickhouse-server
      - ./docker-data/clickhouse/config:/etc/clickhouse-server/config.d
      - ./docker-data/clickhouse/user-files:/var/lib/clickhouse/user_files
      - ./docker-data/clickhouse/tmp:/tmp/clickhouse-server
    ulimits:
      # 文件句柄限制（ClickHouse 推荐配置）
      nofile:
        soft: 65536
        hard: 65536
      # 内存限制（根据服务器配置调整）
      memlock:
        soft: 8589934592  # 8GB
        hard: 12884901888  # 12GB
    networks:
      - dzh3136-network
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user default --password dzh123456 -q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      

  sync-canal-go:
    image: registry.cn-heyuan.aliyuncs.com/gzdzh/sync-canal-go:${SYNC_CANAL_TAG:-latest}
    container_name: sync-canal-go
    restart: always
    depends_on:
      - clickhouse
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./docker-data/sync-canal-go/config:/app/manifest/config
      - ./docker-data/sync-canal-go/logs:/app/logs
    ports:
      - 8000:8000      
    networks:
      - dzh3136-network 
    healthcheck:
      test: ["CMD-SHELL", "pgrep sync-service || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s      
      
     

networks:
  dzh3136-network:
    external: true
    name: dzh3136-go-network